# Chainlit Configuration
# Customize the UI appearance and behavior

[project]
# Whether to enable telemetry
enable_telemetry = false

# List of environment variables to be provided by each user
user_env = []

# Duration (in seconds) during which the session is saved when the connection is lost
session_timeout = 3600

# Enable third parties caching
cache = false

# Authorized origins
allow_origins = ["*"]

[features]
# Show the prompt playground
prompt_playground = false

# Process and display HTML in messages
unsafe_allow_html = true

# Process and display LaTeX expressions
latex = true

# Authorize users to upload files
[features.spontaneous_file_upload]
enabled = true
accept = ["*/*"]
max_files = 5
max_size_mb = 20

[features.audio]
# Threshold for audio detection
min_decibels = -45
# Delay for the user to start speaking
initial_silence_timeout = 3000
# Delay for the user to continue speaking
silence_timeout = 1500
# Above this duration (MS), the recording will forcefully stop
max_duration = 15000
# Duration of the audio chunks in MS
chunk_duration = 1000
# Sample rate of the audio
sample_rate = 44100

[UI]
# Name of the assistant
name = "AutoResearch Agent"

# The description of the app for SEO
description = "AI-powered research assistant with autonomous multi-tool reasoning. Built with LangGraph and Gemini."

# Default theme: "light" or "dark"
default_theme = "dark"

# Hide the chain of thought details from the user in the UI
hide_cot = false

# Show the README of the assistant
show_readme_as_default = true

# Specify a CSS file that can be used to customize the user interface
custom_css = "/public/style.css"

# Specify a Javascript file that can be used to customize the user interface
custom_js = ""

# Specify a custom font url
custom_font = "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"

# Specify a custom build directory for the frontend
custom_build = ""

# Override default MUI light theme. (Check theme.ts)
[UI.theme]
font_family = "Inter, sans-serif"

[UI.theme.light]
background = "#FAFAFA"
paper = "#FFFFFF"

[UI.theme.light.primary]
main = "#7B61FF"
dark = "#5A47CC"
light = "#9D87FF"

[UI.theme.light.text]
primary = "#1A1A2E"
secondary = "#4A4A68"

[UI.theme.dark]
background = "#0F0F1E"
paper = "#1A1A2E"

[UI.theme.dark.primary]
main = "#9D87FF"
dark = "#7B61FF"
light = "#B7A6FF"

[UI.theme.dark.text]
primary = "#F5F5F5"
secondary = "#B8B8C8"

[meta]
generated_by = "1.3.0"
